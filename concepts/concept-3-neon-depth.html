<!DOCTYPE html>
<!--
  CONCEPT MOCKUP — production swaps faked canvas base for MapLibre GL dark tiles
  (or deck.gl for true 3D) + live webhook→WebSocket entity feed.

  "NEON DEPTH" — sci-fi real-time tracking map HUD (Concept 3 of 3)
  Signature feature: ALTITUDE STALKS — altitude rendered as glowing vertical lines.
  Single self-contained file. No network, no CDN, no external assets. Works via file://.
-->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>NEON DEPTH // Tracking HUD</title>
<style>
  :root {
    --bg-0:      #050914;
    --bg-1:      #070d1e;
    --navy:      #0a1230;
    --cyan:      #22d3ee;
    --cyan-dim:  #0e7490;
    --orange:    #ff7a1a;
    --orange-dim:#7a3a0e;
    --purple:    #7c5cff;
    --ink:       #d7ecf5;
    --ink-dim:   #6f8aa3;
    --glass:     rgba(10, 20, 44, 0.42);
    --glass-brd: rgba(34, 211, 238, 0.28);
    --mono: "SFMono-Regular", "SF Mono", ui-monospace, "Menlo", "Consolas", monospace;
    --sans: "Helvetica Neue", "Segoe UI", system-ui, -apple-system, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg-0);
    color: var(--ink);
    font-family: var(--sans);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  #app {
    position: fixed;
    inset: 0;
    overflow: hidden;
    background:
      radial-gradient(1200px 700px at 78% 8%, rgba(124, 92, 255, 0.10), transparent 60%),
      radial-gradient(900px 600px at 12% 90%, rgba(34, 211, 238, 0.06), transparent 60%),
      linear-gradient(180deg, #070d1e 0%, #050914 55%, #03060f 100%);
  }

  /* ---------- Map canvas ---------- */
  #map {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* atmospheric vignette + top scanline haze over canvas */
  #atmos {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(120% 80% at 50% 120%, transparent 55%, rgba(3,6,15,0.85) 100%),
      linear-gradient(180deg, rgba(5,9,20,0.55) 0%, transparent 22%);
    mix-blend-mode: normal;
    z-index: 2;
  }
  #atmos::after {
    content: "";
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(34,211,238,0.030) 0px,
      rgba(34,211,238,0.030) 1px,
      transparent 2px,
      transparent 4px
    );
    opacity: 0.5;
    mix-blend-mode: screen;
  }

  /* ---------- Shared glass ---------- */
  .glass {
    background: var(--glass);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    border: 1px solid var(--glass-brd);
    border-radius: 16px;
    box-shadow:
      0 0 0 1px rgba(34,211,238,0.05) inset,
      0 8px 40px rgba(0,0,0,0.55),
      0 0 42px rgba(34,211,238,0.10);
  }

  .mono { font-family: var(--mono); letter-spacing: 0.06em; }
  .up   { text-transform: uppercase; }

  /* ---------- Top status bar ---------- */
  #topbar {
    position: absolute;
    top: 18px; left: 0; right: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 22px;
    gap: 14px;
    pointer-events: none;
  }
  #brand {
    display: flex; align-items: center; gap: 12px;
    pointer-events: auto;
  }
  #brand .logo {
    width: 30px; height: 30px; border-radius: 8px;
    position: relative;
    background: linear-gradient(135deg, rgba(34,211,238,0.25), rgba(124,92,255,0.15));
    border: 1px solid rgba(34,211,238,0.5);
    box-shadow: 0 0 18px rgba(34,211,238,0.35);
  }
  #brand .logo::before {
    content: "";
    position: absolute; inset: 7px;
    border: 1.5px solid var(--cyan);
    border-radius: 3px;
    transform: rotate(45deg);
    box-shadow: 0 0 8px var(--cyan);
  }
  #brand .name { font-weight: 700; letter-spacing: 0.22em; font-size: 13px; }
  #brand .name span { color: var(--cyan); text-shadow: 0 0 14px rgba(34,211,238,0.6); }
  #brand .sub { font-size: 9.5px; color: var(--ink-dim); letter-spacing: 0.34em; margin-top: 2px; }

  #status {
    display: flex; align-items: center; gap: 16px;
    pointer-events: auto;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(6, 12, 28, 0.5);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(34,211,238,0.16);
  }
  .live {
    display: flex; align-items: center; gap: 8px;
    font-size: 10.5px; letter-spacing: 0.14em; color: var(--ink);
  }
  .live .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--orange);
    box-shadow: 0 0 12px 2px var(--orange);
    animation: pulseDot 1.6s ease-in-out infinite;
  }
  .live.cyan .dot { background: var(--cyan); box-shadow: 0 0 12px 2px var(--cyan); }
  @keyframes pulseDot { 0%,100%{ opacity: 1; transform: scale(1);} 50%{ opacity: 0.35; transform: scale(0.7);} }
  #status .sep { width: 1px; height: 16px; background: rgba(255,255,255,0.12); }
  #utc { font-size: 11px; color: var(--cyan); text-shadow: 0 0 12px rgba(34,211,238,0.5); }

  /* ---------- Hero card ---------- */
  #hero {
    position: absolute;
    top: 78px; left: 22px;
    z-index: 15;
    width: 340px;
    padding: 20px 22px 18px;
    overflow: hidden;
  }
  #hero .glow-edge {
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0.9;
    filter: blur(0.3px);
  }
  #hero .row-top {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  #hero .tag {
    font-size: 10px; letter-spacing: 0.28em; color: var(--cyan);
    text-shadow: 0 0 12px rgba(34,211,238,0.55);
  }
  #hero .tag b { color: var(--ink); }
  #hero .clock {
    font-size: 12px; color: var(--orange);
    text-shadow: 0 0 12px rgba(255,122,26,0.55);
  }
  #hero .idlabel {
    margin-top: 14px;
    font-size: 10px; letter-spacing: 0.22em; color: var(--ink-dim);
  }
  #hero .id {
    margin-top: 4px;
    font-family: var(--mono);
    font-size: 34px; font-weight: 700; letter-spacing: 0.02em;
    line-height: 1;
    color: #eafcff;
    text-shadow: 0 0 22px rgba(34,211,238,0.45);
    white-space: nowrap;
  }
  #hero .id .t { color: var(--cyan); }
  #hero .typerow {
    margin-top: 12px;
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; letter-spacing: 0.1em;
  }
  #hero .chipmini {
    padding: 3px 9px; border-radius: 6px;
    font-size: 9.5px; letter-spacing: 0.18em; font-family: var(--mono);
    border: 1px solid rgba(34,211,238,0.35);
    color: var(--cyan);
    background: rgba(34,211,238,0.08);
  }
  #hero .chipmini.balloon { border-color: rgba(124,92,255,0.5); color: #b9a8ff; background: rgba(124,92,255,0.10);}
  #hero .chipmini.aircraft { border-color: rgba(34,211,238,0.5); color: var(--cyan); background: rgba(34,211,238,0.10);}
  #hero .chipmini.vehicle { border-color: rgba(255,122,26,0.5); color: #ffb27a; background: rgba(255,122,26,0.10);}
  #hero .status-ok { color: var(--ink-dim); }
  #hero .status-ok b { color: #7CFFB2; text-shadow: 0 0 10px rgba(124,255,178,0.5); }

  #hero .metrics {
    margin-top: 16px;
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  #hero .metric {
    padding: 8px 10px;
    border-radius: 10px;
    background: rgba(4, 10, 26, 0.5);
    border: 1px solid rgba(255,255,255,0.06);
  }
  #hero .metric .k { font-size: 8.5px; letter-spacing: 0.16em; color: var(--ink-dim); }
  #hero .metric .v {
    margin-top: 3px; font-family: var(--mono); font-size: 16px; font-weight: 700; color: #eafcff;
  }
  #hero .metric .v small { font-size: 9px; color: var(--ink-dim); font-weight: 400; margin-left: 2px; }
  #hero .metric.alt .v { color: var(--cyan); text-shadow: 0 0 12px rgba(34,211,238,0.4); }

  /* altitude progress bar */
  #altbar {
    margin-top: 14px;
    height: 5px; border-radius: 3px;
    background: rgba(255,255,255,0.06);
    overflow: hidden; position: relative;
  }
  #altbar > i {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 0%;
    background: linear-gradient(90deg, var(--cyan-dim), var(--cyan));
    box-shadow: 0 0 14px rgba(34,211,238,0.6);
    transition: width 0.4s ease;
  }
  #hero .altnote {
    margin-top: 6px; display: flex; justify-content: space-between;
    font-size: 8.5px; letter-spacing: 0.12em; color: var(--ink-dim);
  }

  /* ---------- Legend (top-right small) ---------- */
  #legend {
    position: absolute;
    top: 78px; right: 22px;
    z-index: 15;
    padding: 12px 14px;
    display: flex; flex-direction: column; gap: 9px;
    width: 176px;
  }
  #legend .lg-title { font-size: 9px; letter-spacing: 0.24em; color: var(--ink-dim); margin-bottom: 2px; }
  #legend .lg {
    display: flex; align-items: center; gap: 9px; font-size: 10px; letter-spacing: 0.08em; color: var(--ink);
  }
  #legend .swatch {
    width: 20px; height: 3px; border-radius: 2px; position: relative;
  }
  #legend .swatch.stalk { width: 3px; height: 18px; }
  #legend .swatch.cyan { background: var(--cyan); box-shadow: 0 0 10px var(--cyan); }
  #legend .swatch.purple { background: var(--purple); box-shadow: 0 0 10px var(--purple); }
  #legend .swatch.orange { background: var(--orange); box-shadow: 0 0 10px var(--orange); }
  #legend .lg small { color: var(--ink-dim); margin-left: auto; font-family: var(--mono); font-size: 9px; }

  /* ---------- Chips dock (bottom) ---------- */
  #dock {
    position: absolute;
    bottom: 20px; left: 22px; right: 22px;
    z-index: 15;
    display: flex; align-items: center; gap: 12px;
  }
  #dock .dock-title {
    flex: 0 0 auto;
    font-size: 9.5px; letter-spacing: 0.24em; color: var(--ink-dim);
    writing-mode: vertical-rl; text-orientation: mixed;
    transform: rotate(180deg);
    padding: 4px 0;
  }
  #chips {
    display: flex; gap: 10px; overflow-x: auto; overflow-y: hidden;
    padding: 4px 2px 8px;
    scrollbar-width: none;
    flex: 1 1 auto;
  }
  #chips::-webkit-scrollbar { display: none; }
  .chip {
    flex: 0 0 auto;
    min-width: 158px;
    padding: 10px 13px;
    border-radius: 13px;
    background: rgba(8, 15, 34, 0.55);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.07);
    cursor: pointer;
    transition: border-color .25s, box-shadow .25s, transform .18s, background .25s;
    position: relative;
    overflow: hidden;
  }
  .chip:hover { transform: translateY(-3px); }
  .chip .chip-top { display: flex; align-items: center; gap: 7px; }
  .chip .glyph {
    width: 20px; height: 20px; flex: 0 0 auto;
    display: grid; place-items: center;
    border-radius: 6px;
    font-size: 11px;
  }
  .chip .chip-id { font-family: var(--mono); font-size: 12px; font-weight: 700; letter-spacing: 0.04em; }
  .chip .chip-type { font-size: 8px; letter-spacing: 0.2em; color: var(--ink-dim); margin-left: auto; }
  .chip .chip-meta {
    margin-top: 8px; display: flex; align-items: center; gap: 10px;
    font-family: var(--mono); font-size: 10px; color: var(--ink-dim);
  }
  .chip .chip-meta b { color: var(--ink); font-weight: 600; }
  .chip .spark {
    position: absolute; right: 0; bottom: 0; left: 0; height: 3px;
    background: linear-gradient(90deg, transparent, currentColor, transparent);
    opacity: 0; transition: opacity .25s;
  }
  .chip.active {
    background: rgba(12, 24, 52, 0.7);
    border-color: rgba(34,211,238,0.55);
    box-shadow: 0 0 26px rgba(34,211,238,0.22), 0 8px 30px rgba(0,0,0,0.5);
  }
  .chip.active .spark { opacity: 1; }
  .chip.balloon  { color: var(--purple); }
  .chip.aircraft { color: var(--cyan); }
  .chip.vehicle  { color: var(--orange); }
  .chip.balloon  .glyph { background: rgba(124,92,255,0.14); color: #c3b4ff; }
  .chip.aircraft .glyph { background: rgba(34,211,238,0.14); color: var(--cyan); }
  .chip.vehicle  .glyph { background: rgba(255,122,26,0.14); color: #ffb27a; }

  /* ---------- Mobile ---------- */
  @media (max-width: 767px) {
    #topbar { top: 12px; padding: 0 14px; }
    #brand .sub { display: none; }
    #status { gap: 10px; padding: 6px 10px; }
    #utc { display: none; }
    #legend { display: none; }

    #hero {
      top: 62px; left: 12px; right: 12px;
      width: auto;
      padding: 15px 16px 14px;
    }
    #hero .id { font-size: 27px; }
    #hero .metrics { gap: 7px; }
    #hero .metric { padding: 6px 8px; }
    #hero .metric .v { font-size: 14px; }

    #dock { left: 10px; right: 10px; bottom: 12px; }
    #dock .dock-title { display: none; }
    #chips { padding: 2px 2px 6px; }
    .chip { min-width: 142px; }
  }

  @media (max-width: 767px) and (max-height: 720px) {
    #hero .metrics, #altbar, #hero .altnote { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    .live .dot { animation: none; }
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="map"></canvas>
  <div id="atmos"></div>

  <!-- Top bar -->
  <div id="topbar">
    <div id="brand">
      <div class="logo"></div>
      <div>
        <div class="name mono up">NEON<span>·</span>DEPTH</div>
        <div class="sub mono up">Aerial Tracking Grid</div>
      </div>
    </div>
    <div id="status">
      <div class="live cyan"><span class="dot"></span><span class="mono up">Webhook // Live</span></div>
      <div class="sep"></div>
      <div class="live"><span class="dot"></span><span class="mono up" id="feedcount">— tracks</span></div>
      <div class="sep"></div>
      <div id="utc" class="mono">--:--:-- UTC</div>
    </div>
  </div>

  <!-- Hero focus card -->
  <div id="hero" class="glass">
    <div class="glow-edge"></div>
    <div class="row-top">
      <div class="tag mono up">Tracking <b>//</b> <span id="heroState">Active</span></div>
      <div class="clock mono" id="heroClock">00:00:00</div>
    </div>

    <div class="idlabel mono up">Tracking Number</div>
    <div class="id mono" id="heroId"><span class="t">···</span></div>

    <div class="typerow">
      <span class="chipmini aircraft mono up" id="heroType">TYPE</span>
      <span class="status-ok mono up">SIGNAL&nbsp; <b id="heroSignal">LOCKED</b></span>
    </div>

    <div class="metrics">
      <div class="metric alt">
        <div class="k mono up">Altitude</div>
        <div class="v" id="mAlt">0<small>ft</small></div>
      </div>
      <div class="metric">
        <div class="k mono up">Speed</div>
        <div class="v" id="mSpd">0<small>kt</small></div>
      </div>
      <div class="metric">
        <div class="k mono up">Heading</div>
        <div class="v" id="mHdg">0<small>°</small></div>
      </div>
    </div>

    <div id="altbar"><i></i></div>
    <div class="altnote mono up">
      <span>GND</span>
      <span id="climbNote">— CLIMB</span>
      <span>35K ft</span>
    </div>
  </div>

  <!-- Legend -->
  <div id="legend" class="glass">
    <div class="lg-title mono up">Altitude Stalks</div>
    <div class="lg"><span class="swatch stalk purple"></span><span>Balloon</span><small id="cBalloon">0</small></div>
    <div class="lg"><span class="swatch stalk cyan"></span><span>Aircraft</span><small id="cAircraft">0</small></div>
    <div class="lg"><span class="swatch stalk orange"></span><span>Vehicle</span><small id="cVehicle">0</small></div>
    <div class="lg" style="margin-top:2px;opacity:.7"><span class="swatch cyan" style="width:16px;height:2px"></span><span style="font-size:9px">Ground trail</span></div>
  </div>

  <!-- Bottom chip dock -->
  <div id="dock">
    <div class="dock-title mono up">Fleet</div>
    <div id="chips"></div>
  </div>
</div>

<script>
"use strict";
/* =====================================================================
   NEON DEPTH — concept mockup engine
   Faked holographic city base + altitude-stalk entity rendering.
   Production: replace canvas base with MapLibre GL dark tiles / deck.gl,
   feed entities from webhook→WebSocket instead of the sim loop below.
   ===================================================================== */

const canvas = document.getElementById('map');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  buildBase();
}
window.addEventListener('resize', resize);

/* -------- pseudo-perspective helpers --------
   The "world" is a normalized 0..1 lat/lon plane.
   We map it to screen with a slight vertical foreshortening so the
   bottom of the screen feels "closer" (denser grid) — a fake horizon. */
function worldToScreen(nx, ny) {
  // nx,ny in 0..1 ; ny=0 top (far), ny=1 bottom (near)
  const horizon = 0.06;               // far compression at top
  const y = (horizon + (1 - horizon) * Math.pow(ny, 1.18)) * H;
  const shrink = 0.5 + 0.5 * ny;      // far side pinches toward center
  const x = (0.5 + (nx - 0.5) * (0.62 + 0.38 * shrink)) * W;
  return { x, y, depth: ny };
}

/* -------- Static base layers baked once per resize -------- */
let districts = [];
let nodes = [];
let routes = [];

function seededRand(seed) {
  let s = seed % 2147483647;
  if (s <= 0) s += 2147483646;
  return () => (s = (s * 16807) % 2147483647) / 2147483647;
}

function buildBase() {
  const rnd = seededRand(20260715);
  // district blocks (faint filled polygons on the plane)
  districts = [];
  for (let i = 0; i < 26; i++) {
    const cx = rnd(), cy = 0.12 + rnd() * 0.86;
    const w = 0.05 + rnd() * 0.10;
    const h = 0.05 + rnd() * 0.09;
    districts.push({ cx, cy, w, h, a: 0.02 + rnd() * 0.05 });
  }
  // network nodes
  nodes = [];
  for (let i = 0; i < 16; i++) {
    nodes.push({ nx: 0.06 + rnd() * 0.88, ny: 0.12 + rnd() * 0.84 });
  }
  // glowing routes connecting nearby nodes
  routes = [];
  for (let i = 0; i < nodes.length; i++) {
    let best = -1, bd = 9;
    for (let j = 0; j < nodes.length; j++) {
      if (i === j) continue;
      const d = Math.hypot(nodes[i].nx - nodes[j].nx, nodes[i].ny - nodes[j].ny);
      if (d < bd && d > 0.04) { bd = d; best = j; }
    }
    if (best >= 0) routes.push([i, best, rnd()]);
    // occasional second link
    if (rnd() > 0.55) {
      let b2 = Math.floor(rnd() * nodes.length);
      if (b2 !== i) routes.push([i, b2, rnd()]);
    }
  }
}

function drawBase(t) {
  // deep gradient background wash (canvas side, CSS handles outer glow)
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, 'rgba(9,15,34,0.0)');
  g.addColorStop(0.55, 'rgba(6,11,26,0.25)');
  g.addColorStop(1, 'rgba(3,6,15,0.55)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // district blocks
  ctx.save();
  for (const d of districts) {
    const p0 = worldToScreen(d.cx - d.w/2, d.cy - d.h/2);
    const p1 = worldToScreen(d.cx + d.w/2, d.cy - d.h/2);
    const p2 = worldToScreen(d.cx + d.w/2, d.cy + d.h/2);
    const p3 = worldToScreen(d.cx - d.w/2, d.cy + d.h/2);
    ctx.beginPath();
    ctx.moveTo(p0.x, p0.y); ctx.lineTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y); ctx.lineTo(p3.x, p3.y);
    ctx.closePath();
    ctx.fillStyle = `rgba(34,211,238,${d.a})`;
    ctx.fill();
    ctx.strokeStyle = `rgba(34,211,238,${d.a * 1.6})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }
  ctx.restore();

  // dotted perspective grid — denser toward bottom (near)
  ctx.save();
  const cols = 22, rows = 20;
  for (let r = 0; r <= rows; r++) {
    const ny = r / rows;
    for (let c = 0; c <= cols; c++) {
      const nx = c / cols;
      const p = worldToScreen(nx, ny);
      const near = 0.25 + 0.75 * ny;         // fade far dots
      const size = 0.6 + 1.4 * ny;
      ctx.beginPath();
      ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(34,211,238,${0.05 * near})`;
      ctx.fill();
    }
  }
  // faint horizontal isolines
  for (let r = 1; r < rows; r++) {
    const ny = r / rows;
    const near = 0.15 + 0.85 * ny;
    ctx.beginPath();
    for (let c = 0; c <= cols; c++) {
      const p = worldToScreen(c / cols, ny);
      c === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
    }
    ctx.strokeStyle = `rgba(60,120,180,${0.045 * near})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }
  ctx.restore();

  // glowing routes with animated flowing pulse
  ctx.save();
  ctx.lineCap = 'round';
  for (const [a, b, ph] of routes) {
    const pa = worldToScreen(nodes[a].nx, nodes[a].ny);
    const pb = worldToScreen(nodes[b].nx, nodes[b].ny);
    const near = 0.4 + 0.6 * ((nodes[a].ny + nodes[b].ny) / 2);
    ctx.beginPath();
    ctx.moveTo(pa.x, pa.y); ctx.lineTo(pb.x, pb.y);
    ctx.strokeStyle = `rgba(34,211,238,${0.10 * near})`;
    ctx.lineWidth = 1.1;
    ctx.stroke();

    // flowing packet
    const f = (t * 0.00016 + ph) % 1;
    const fx = pa.x + (pb.x - pa.x) * f;
    const fy = pa.y + (pb.y - pa.y) * f;
    ctx.beginPath();
    ctx.arc(fx, fy, 1.8, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(120,230,255,${0.5 * near})`;
    ctx.shadowColor = 'rgba(34,211,238,0.9)';
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  // node dots
  for (const n of nodes) {
    const p = worldToScreen(n.nx, n.ny);
    const near = 0.4 + 0.6 * n.ny;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2.2, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(150,220,255,${0.35 * near})`;
    ctx.fill();
  }
  ctx.restore();
}

/* =====================================================================
   ENTITIES
   ===================================================================== */
const TYPES = {
  balloon:  { color: '#7c5cff', glow: 'rgba(124,92,255,', maxAlt: 35000, glyph: '◉' },
  aircraft: { color: '#22d3ee', glow: 'rgba(34,211,238,', maxAlt: 38000, glyph: '✈' },
  vehicle:  { color: '#ff7a1a', glow: 'rgba(255,122,26,', maxAlt: 400,   glyph: '▮' }
};

function rid(prefix) {
  const c = "ABCDEFGHJKLMNPRTUVWXYZ";
  const d = "0123456789";
  const p = () => c[Math.floor(Math.random()*c.length)];
  const n = () => d[Math.floor(Math.random()*d.length)];
  return `${prefix}-${p()}${n()}${n()}${p()}${n()}`;
}

let entities = [];
function makeEntities() {
  const specs = [
    { type: 'balloon',  alt: 22000, phase: 'ascend' },
    { type: 'balloon',  alt: 31000, phase: 'burst'  },
    { type: 'aircraft', alt: 34000 },
    { type: 'aircraft', alt: 18500 },
    { type: 'aircraft', alt: 9500  },
    { type: 'vehicle',  alt: 60    },
    { type: 'vehicle',  alt: 120   },
    { type: 'balloon',  alt: 14000, phase: 'ascend' },
  ];
  entities = specs.map((s, i) => {
    const prefix = s.type === 'balloon' ? 'RS' : s.type === 'aircraft' ? 'AC' : 'GV';
    const heading = Math.random() * 360;
    const speed = s.type === 'vehicle' ? 20 + Math.random()*45
                 : s.type === 'balloon' ? 8 + Math.random()*22
                 : 260 + Math.random()*250;
    return {
      id: rid(prefix),
      type: s.type,
      nx: 0.14 + Math.random() * 0.72,
      ny: 0.18 + Math.random() * 0.70,
      alt: s.alt,
      altTarget: s.alt,
      heading,
      speed,
      climb: 0,
      phase: s.phase || 'cruise',
      pulse: Math.random() * Math.PI * 2,
      trail: [],
      signal: Math.random() > 0.15 ? 'LOCKED' : 'ACQUIRING'
    };
  });
}

/* motion + altitude behaviours */
function stepEntity(e, dt) {
  const rad = (e.heading - 90) * Math.PI / 180;
  const v = e.speed * dt * 0.0000009 * (e.type === 'vehicle' ? 2.2 : 1);
  e.nx += Math.cos(rad) * v;
  e.ny += Math.sin(rad) * v * 0.7;

  // bounce / wrap softly inside a margin
  if (e.nx < 0.08) { e.nx = 0.08; e.heading = (540 - e.heading) % 360; }
  if (e.nx > 0.92) { e.nx = 0.92; e.heading = (540 - e.heading) % 360; }
  if (e.ny < 0.12) { e.ny = 0.12; e.heading = (360 - e.heading) % 360; }
  if (e.ny > 0.90) { e.ny = 0.90; e.heading = (360 - e.heading) % 360; }
  // gentle heading drift
  e.heading = (e.heading + (Math.random() - 0.5) * 12 * dt * 0.001 + 360) % 360;

  // altitude behaviour
  if (e.type === 'balloon') {
    if (e.phase === 'ascend') {
      e.altTarget = 33000 + Math.random()*2000;
      if (e.alt > 32000) e.phase = 'burst';
    } else if (e.phase === 'burst') {
      e.altTarget = 800;
      if (e.alt < 1500) e.phase = 'ascend';
    }
    e.climb = (e.altTarget - e.alt) * 0.0006;
    e.alt += e.climb * dt;
  } else if (e.type === 'aircraft') {
    // slow cruise wander
    if (Math.random() < 0.004) e.altTarget = 8000 + Math.random()*30000;
    e.climb = (e.altTarget - e.alt) * 0.00012;
    e.alt += e.climb * dt;
  } else {
    e.altTarget = 30 + Math.random()*260;
    e.climb = (e.altTarget - e.alt) * 0.0004;
    e.alt += e.climb * dt;
  }
  e.alt = Math.max(0, e.alt);
  e.pulse += dt * 0.004;

  // trail (ground path)
  if (!e._tacc) e._tacc = 0;
  e._tacc += dt;
  if (e._tacc > 90) {
    e._tacc = 0;
    e.trail.push({ nx: e.nx, ny: e.ny });
    if (e.trail.length > 34) e.trail.shift();
  }
}

/* stalk height in px from altitude (perspective-aware) */
function stalkPx(alt, depth) {
  const maxH = 210 + 120 * depth;         // near entities get taller stalks
  const norm = Math.min(1, alt / 35000);
  return Math.pow(norm, 0.85) * maxH;
}

let focusIndex = 0;
let focusLocked = false;   // true if user clicked (pauses auto-cycle briefly)
let lastUserFocus = 0;

function drawEntities(t, dt) {
  // sort by depth so nearer entities draw on top
  const order = entities.map((e, i) => i).sort((a, b) => entities[a].ny - entities[b].ny);

  for (const i of order) {
    const e = entities[i];
    const T = TYPES[e.type];
    const focused = i === focusIndex;
    const p = worldToScreen(e.nx, e.ny);
    const depth = p.depth;
    const dimA = focused ? 1 : 0.42;

    // ---- ground trail ----
    if (e.trail.length > 1) {
      ctx.beginPath();
      for (let k = 0; k < e.trail.length; k++) {
        const tp = worldToScreen(e.trail[k].nx, e.trail[k].ny);
        k === 0 ? ctx.moveTo(tp.x, tp.y) : ctx.lineTo(tp.x, tp.y);
      }
      ctx.lineTo(p.x, p.y);
      ctx.strokeStyle = T.glow + (0.28 * dimA) + ')';
      ctx.lineWidth = focused ? 1.8 : 1.1;
      ctx.shadowColor = T.glow + '0.7)';
      ctx.shadowBlur = focused ? 8 : 3;
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // ---- ground contact ring (base of stalk) ----
    const pulse = 0.5 + 0.5 * Math.sin(e.pulse);
    const ringR = (6 + 4 * depth) * (focused ? 1.25 : 1);
    ctx.beginPath();
    ctx.ellipse(p.x, p.y, ringR, ringR * 0.42, 0, 0, Math.PI * 2);
    ctx.strokeStyle = T.glow + (0.5 * dimA) + ')';
    ctx.lineWidth = 1.4;
    ctx.shadowColor = T.glow + '0.9)';
    ctx.shadowBlur = focused ? 14 : 5;
    ctx.stroke();
    ctx.shadowBlur = 0;
    // expanding pulse ring on focused
    if (focused) {
      const pr = ringR + pulse * 16;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, pr, pr * 0.42, 0, 0, Math.PI * 2);
      ctx.strokeStyle = T.glow + (0.35 * (1 - pulse)) + ')';
      ctx.lineWidth = 1.2;
      ctx.stroke();
    }
    // ground dot
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2.2, 0, Math.PI * 2);
    ctx.fillStyle = T.color;
    ctx.globalAlpha = dimA;
    ctx.fill();
    ctx.globalAlpha = 1;

    // ---- ALTITUDE STALK ----
    const hpx = stalkPx(e.alt, depth);
    const topX = p.x;
    const topY = p.y - hpx;

    // stalk gradient (bright at top node, fades at ground)
    const grd = ctx.createLinearGradient(p.x, p.y, topX, topY);
    grd.addColorStop(0, T.glow + (0.05 * dimA) + ')');
    grd.addColorStop(0.5, T.glow + (0.35 * dimA) + ')');
    grd.addColorStop(1, T.glow + (0.9 * dimA) + ')');
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(topX, topY);
    ctx.strokeStyle = grd;
    ctx.lineWidth = focused ? 2.4 : 1.4;
    ctx.shadowColor = T.glow + '0.85)';
    ctx.shadowBlur = focused ? 16 : 7;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // climb indicator ticks along stalk
    if (focused && Math.abs(e.climb) > 0.3) {
      const dir = e.climb > 0 ? -1 : 1;
      const flow = (t * 0.002) % 1;
      for (let s = 0; s < 4; s++) {
        const fpos = ((s / 4) + flow) % 1;
        const ty = p.y - hpx * fpos;
        ctx.beginPath();
        ctx.moveTo(topX - 4, ty + dir * 3);
        ctx.lineTo(topX, ty);
        ctx.lineTo(topX + 4, ty + dir * 3);
        ctx.strokeStyle = T.glow + (0.6 * (1 - fpos)) + ')';
        ctx.lineWidth = 1.4;
        ctx.stroke();
      }
    }

    // ---- top node marker ----
    const nodeR = (focused ? 6 : 4) + depth * 1.5;
    // outer glow halo
    const halo = ctx.createRadialGradient(topX, topY, 0, topX, topY, nodeR * 4);
    halo.addColorStop(0, T.glow + (0.55 * dimA) + ')');
    halo.addColorStop(1, T.glow + '0)');
    ctx.beginPath();
    ctx.arc(topX, topY, nodeR * 4, 0, Math.PI * 2);
    ctx.fillStyle = halo;
    ctx.fill();
    // solid core
    ctx.beginPath();
    ctx.arc(topX, topY, nodeR, 0, Math.PI * 2);
    ctx.fillStyle = focused ? '#ffffff' : T.color;
    ctx.shadowColor = T.glow + '1)';
    ctx.shadowBlur = focused ? 18 : 8;
    ctx.globalAlpha = dimA;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
    // ring around node
    ctx.beginPath();
    ctx.arc(topX, topY, nodeR + 3 + pulse * (focused ? 4 : 1.5), 0, Math.PI * 2);
    ctx.strokeStyle = T.glow + ((focused ? 0.7 : 0.4) * dimA) + ')';
    ctx.lineWidth = 1.2;
    ctx.stroke();

    // ---- floating label near top node ----
    if (focused || depth > 0.45) {
      const lx = topX + 12;
      const ly = topY - 6;
      ctx.font = focused
        ? '700 12px SFMono-Regular, ui-monospace, monospace'
        : '600 10px SFMono-Regular, ui-monospace, monospace';
      const idTxt = e.id;
      const altTxt = Math.round(e.alt).toLocaleString() + ' ft';
      const wLbl = Math.max(ctx.measureText(idTxt).width, ctx.measureText(altTxt).width) + 16;
      const hLbl = focused ? 34 : 26;
      // connector
      ctx.beginPath();
      ctx.moveTo(topX + nodeR, topY);
      ctx.lineTo(lx - 3, ly - hLbl/2 + 4);
      ctx.strokeStyle = T.glow + (0.5 * dimA) + ')';
      ctx.lineWidth = 1;
      ctx.stroke();
      // label bg
      const by = ly - hLbl/2 - 4;
      roundRect(lx - 4, by, wLbl, hLbl, 5);
      ctx.fillStyle = `rgba(6,12,26,${0.72 * (focused ? 1 : 0.85)})`;
      ctx.fill();
      ctx.strokeStyle = T.glow + (0.45 * dimA) + ')';
      ctx.lineWidth = 1;
      ctx.stroke();
      // text
      ctx.fillStyle = focused ? '#eafcff' : 'rgba(215,236,245,0.85)';
      ctx.globalAlpha = dimA;
      ctx.fillText(idTxt, lx + 3, by + (focused ? 15 : 12));
      ctx.fillStyle = T.color;
      ctx.font = (focused ? '600 10px' : '500 9px') + ' SFMono-Regular, ui-monospace, monospace';
      ctx.fillText(altTxt, lx + 3, by + (focused ? 28 : 22));
      ctx.globalAlpha = 1;
    }
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

/* =====================================================================
   HUD sync (hero card + chips + clock)
   ===================================================================== */
const $ = id => document.getElementById(id);

function pad(n){ return String(n).padStart(2,'0'); }

function typeLabel(t){ return t === 'balloon' ? 'RADIOSONDE' : t === 'aircraft' ? 'ADS-B' : 'GROUND'; }

function buildChips() {
  const wrap = $('chips');
  wrap.innerHTML = '';
  entities.forEach((e, i) => {
    const T = TYPES[e.type];
    const el = document.createElement('div');
    el.className = 'chip ' + e.type + (i === focusIndex ? ' active' : '');
    el.dataset.i = i;
    el.innerHTML = `
      <div class="chip-top">
        <span class="glyph">${T.glyph}</span>
        <span class="chip-id">${e.id}</span>
        <span class="chip-type mono up">${typeLabel(e.type)}</span>
      </div>
      <div class="chip-meta">
        <span>ALT <b data-alt>${Math.round(e.alt).toLocaleString()}</b></span>
        <span>SPD <b data-spd>${Math.round(e.speed)}</b></span>
      </div>
      <span class="spark"></span>`;
    el.addEventListener('click', () => setFocus(i, true));
    wrap.appendChild(el);
  });
  updateLegendCounts();
}

function updateLegendCounts() {
  const c = { balloon:0, aircraft:0, vehicle:0 };
  entities.forEach(e => c[e.type]++);
  $('cBalloon').textContent = c.balloon;
  $('cAircraft').textContent = c.aircraft;
  $('cVehicle').textContent = c.vehicle;
  $('feedcount').textContent = entities.length + ' TRACKS';
}

function setFocus(i, byUser) {
  focusIndex = i;
  if (byUser) { focusLocked = true; lastUserFocus = performance.now(); }
  document.querySelectorAll('.chip').forEach(c => {
    c.classList.toggle('active', +c.dataset.i === i);
  });
  const active = document.querySelector('.chip.active');
  if (active) active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  syncHero(true);
}

function syncHero(instant) {
  const e = entities[focusIndex];
  const T = TYPES[e.type];
  $('heroId').innerHTML = `<span class="t">${e.id.split('-')[0]}-</span>${e.id.split('-')[1]}`;
  const typeEl = $('heroType');
  typeEl.textContent = typeLabel(e.type);
  typeEl.className = 'chipmini ' + e.type + ' mono up';
  $('heroSignal').textContent = e.signal;
  $('mAlt').innerHTML = Math.round(e.alt).toLocaleString() + '<small>ft</small>';
  $('mSpd').innerHTML = Math.round(e.speed) + '<small>' + (e.type==='vehicle'?'mph':'kt') + '</small>';
  $('mHdg').innerHTML = Math.round(e.heading) + '<small>°</small>';
  const pct = Math.min(100, (e.alt / 35000) * 100);
  $('altbar').firstElementChild.style.width = pct.toFixed(1) + '%';
  const climbing = e.climb > 0.4 ? 'CLIMB ▲' : e.climb < -0.4 ? 'DESCEND ▼' : 'LEVEL ■';
  $('climbNote').textContent = climbing;
  $('heroState').textContent = e.phase === 'burst' ? 'DESCENT' : 'ACTIVE';
}

/* live tick of chip alt/spd values (cheap) */
function tickChips() {
  document.querySelectorAll('.chip').forEach(c => {
    const e = entities[+c.dataset.i];
    const a = c.querySelector('[data-alt]');
    const s = c.querySelector('[data-spd]');
    if (a) a.textContent = Math.round(e.alt).toLocaleString();
    if (s) s.textContent = Math.round(e.speed);
  });
}

/* clocks */
function updateClocks() {
  const now = new Date();
  $('utc').textContent =
    pad(now.getUTCHours()) + ':' + pad(now.getUTCMinutes()) + ':' + pad(now.getUTCSeconds()) + ' UTC';
  $('heroClock').textContent =
    pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
}

/* =====================================================================
   Interaction: click on canvas near a top-node to focus
   ===================================================================== */
canvas.addEventListener('click', (ev) => {
  const rect = canvas.getBoundingClientRect();
  const mx = ev.clientX - rect.left;
  const my = ev.clientY - rect.top;
  let best = -1, bd = 34;
  entities.forEach((e, i) => {
    const p = worldToScreen(e.nx, e.ny);
    const hpx = stalkPx(e.alt, p.depth);
    const d = Math.hypot(mx - p.x, my - (p.y - hpx));
    const dg = Math.hypot(mx - p.x, my - p.y);
    const dm = Math.min(d, dg);
    if (dm < bd) { bd = dm; best = i; }
  });
  if (best >= 0) setFocus(best, true);
});

/* =====================================================================
   Main loop
   ===================================================================== */
let last = performance.now();
let cycleTimer = 0;
let chipTimer = 0;

function frame(t) {
  const dt = Math.min(64, t - last);
  last = t;

  ctx.clearRect(0, 0, W, H);
  drawBase(t);
  entities.forEach(e => stepEntity(e, dt));
  drawEntities(t, dt);

  // auto-cycle focus every ~6s unless user just clicked (hold 9s)
  cycleTimer += dt;
  const holdFor = focusLocked ? 9000 : 6000;
  if (cycleTimer > holdFor) {
    cycleTimer = 0;
    focusLocked = false;
    setFocus((focusIndex + 1) % entities.length, false);
  } else {
    syncHero(false);
  }

  // throttle chip number updates (~5fps)
  chipTimer += dt;
  if (chipTimer > 200) { chipTimer = 0; tickChips(); }

  requestAnimationFrame(frame);
}

/* boot */
resize();
makeEntities();
buildChips();
setFocus(0, false);
updateClocks();
setInterval(updateClocks, 1000);
requestAnimationFrame(frame);
</script>
