<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>CHASER MODE // Device GPS Uplink</title>
    <style>
      :root {
        --bg-1: #04070a;
        --cyan: #37e0ff;
        --cyan-dim: #1c7f96;
        --green: #3dffa0;
        --amber: #ffb020;
        --red: #ff3b30;
        --txt-0: #d7e8f0;
        --txt-2: #5f7480;
        --mono: ui-monospace, 'SF Mono', 'SFMono-Regular', Menlo, Consolas, monospace;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body {
        background: var(--bg-1);
        color: var(--txt-0);
        font-family: var(--mono);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        padding: 24px;
        text-align: center;
        letter-spacing: 0.03em;
      }
      h1 {
        font-size: 12px;
        letter-spacing: 0.22em;
        color: var(--cyan);
        text-transform: uppercase;
      }
      .status {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.14em;
        padding: 18px 22px;
        border: 1px solid var(--cyan-dim);
        border-radius: 4px;
        min-width: 260px;
      }
      .status.idle { color: var(--txt-2); border-color: var(--txt-2); }
      .status.transmitting { color: var(--green); border-color: var(--green); box-shadow: 0 0 16px rgba(61, 255, 160, 0.35); }
      .status.paused { color: var(--amber); border-color: var(--amber); }
      .status.error { color: var(--red); border-color: var(--red); box-shadow: 0 0 16px rgba(255, 59, 48, 0.35); }
      .readout { display: grid; grid-template-columns: auto auto; gap: 6px 16px; font-size: 13px; }
      .readout .k { color: var(--txt-2); text-transform: uppercase; letter-spacing: 0.1em; text-align: right; }
      .readout .v { color: var(--txt-0); font-variant-numeric: tabular-nums; text-align: left; }
      .id-tag { font-size: 10px; color: var(--txt-2); letter-spacing: 0.1em; }
      .id-tag b { color: var(--cyan); }
    </style>
  </head>
  <body>
    <h1>Chaser&nbsp;Mode&nbsp;//&nbsp;Device&nbsp;GPS&nbsp;Uplink</h1>
    <div id="status" class="status idle">INITIALIZING…</div>
    <div class="readout">
      <span class="k">Lat</span><span class="v" id="lat">—</span>
      <span class="k">Lon</span><span class="v" id="lon">—</span>
      <span class="k">Accuracy</span><span class="v" id="accuracy">—</span>
      <span class="k">Last&nbsp;post</span><span class="v" id="last-post">—</span>
    </div>
    <div class="id-tag">DEVICE&nbsp;ID&nbsp;<b id="device-id">—</b></div>
    <script type="module" src="/src/chase/chase-page.ts"></script>
  </body>
</html>
